name: Test Maigret Installation

on:
  push:
    branches: [main, test-maigret-install]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test-maigret:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          python -m poetry install
      
      - name: Test maigret version
        run: |
          poetry run maigret --version
      
      - name: Test maigret with sample search (john_paul_smith)
        run: |
          poetry run maigret --timeout 10 --retries 1 --no-color -j john_paul_smith 2>&1 | head -100 || true
      
      - name: Test maigret help
        run: |
          poetry run maigret --help
